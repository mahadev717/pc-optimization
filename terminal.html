<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_TERMINAL | SYSTEM_ACTIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020205;
            color: #39ff14;
            font-family: 'Roboto Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.15;
        }

        .header {
            background: rgba(0, 243, 255, 0.05);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left .pulse {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #39ff14;
            box-shadow: 0 0 8px #39ff14;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: #00f3ff;
            letter-spacing: 3px;
        }

        #status {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #ff3c3c;
            animation: status-blink 1s infinite;
        }

        @keyframes status-blink {
            50% { opacity: 0.5; }
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #console {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .sidebar {
            width: 280px;
            background: rgba(0, 243, 255, 0.03);
            border-left: 1px solid rgba(0, 243, 255, 0.15);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .stat-box {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.1);
            padding: 12px 15px;
        }

        .stat-label {
            font-size: 0.6rem;
            color: #00f3ff;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .stat-value.green { color: #39ff14; }
        .stat-value.red { color: #ff3c3c; }
        .stat-value.cyan { color: #00f3ff; }
        .stat-value.yellow { color: #ffcc00; }

        .line {
            margin-bottom: 4px;
            opacity: 0;
            animation: fade-line 0.3s forwards;
        }

        @keyframes fade-line {
            to { opacity: 1; }
        }

        .line .tag {
            font-weight: bold;
        }

        .tag-system { color: #00f3ff; }
        .tag-action { color: #ffcc00; }
        .tag-success { color: #39ff14; }
        .tag-error { color: #ff3c3c; }
        .tag-info { color: #888; }

        .cursor::after {
            content: '_';
            animation: blink 0.7s infinite;
            color: #39ff14;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .result-box {
            margin-top: 20px;
            padding: 15px 20px;
            border: 1px solid;
            font-size: 0.9rem;
        }

        .result-box.ok {
            border-color: #39ff14;
            background: rgba(57, 255, 20, 0.08);
            color: #39ff14;
        }

        .result-box.fail {
            border-color: #ff3c3c;
            background: rgba(255, 60, 60, 0.08);
            color: #ff3c3c;
        }

        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(0, 243, 255, 0.1);
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #00f3ff;
            box-shadow: 0 0 10px #00f3ff;
            transition: width 0.3s;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; }

        .footer {
            padding: 10px 25px;
            border-top: 1px solid rgba(0, 243, 255, 0.1);
            font-size: 0.65rem;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-left">
            <div class="pulse"></div>
            <div class="header-title" id="header-title">NEURAL_OPTIMIZER_V5</div>
        </div>
        <div id="status">INITIALIZING...</div>
    </div>

    <div class="main">
        <div id="console"></div>
        <div class="sidebar">
            <div class="stat-box">
                <div class="stat-label">OPERATION</div>
                <div class="stat-value cyan" id="op-type">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">MOUSE_SPEED</div>
                <div class="stat-value" id="val-speed">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ACCELERATION</div>
                <div class="stat-value" id="val-accel">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">THRESHOLD_1</div>
                <div class="stat-value" id="val-t1">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">THRESHOLD_2</div>
                <div class="stat-value" id="val-t2">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">POINTER_PRECISION</div>
                <div class="stat-value" id="val-epp">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">POWER_PLAN</div>
                <div class="stat-value" id="val-power">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">STATUS</div>
                <div class="stat-value yellow" id="val-status">PENDING</div>
            </div>
        </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div class="footer">
        <div>HACKER_OS // KERNEL_LINK</div>
        <div id="clock">00:00:00</div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress');
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'aim';

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Set header based on type
        if (type === 'aim') {
            document.getElementById('header-title').innerText = 'MOUSE_AIM_OPTIMIZER';
            document.getElementById('op-type').innerText = 'OPTIMIZE';
        } else {
            document.getElementById('header-title').innerText = 'SYSTEM_RESTORE';
            document.getElementById('op-type').innerText = 'RESTORE';
            document.getElementById('op-type').className = 'stat-value yellow';
        }

        const aimSteps = [
            { tag: 'SYSTEM', text: 'CONNECTING TO WINDOWS KERNEL...', delay: 400 },
            { tag: 'SYSTEM', text: 'READING CURRENT MOUSE REGISTRY...', delay: 300 },
            { tag: 'SYSTEM', text: 'SCANNING INPUT DEVICE HANDLES...', delay: 350 },
            { tag: 'ACTION', text: 'SET MouseSpeed = 0', delay: 200, stat: 'val-speed', val: '0', cls: 'green' },
            { tag: 'ACTION', text: 'SET MouseThreshold1 = 0', delay: 200, stat: 'val-t1', val: '0', cls: 'green' },
            { tag: 'ACTION', text: 'SET MouseThreshold2 = 0', delay: 200, stat: 'val-t2', val: '0', cls: 'green' },
            { tag: 'ACTION', text: 'SET MouseSensitivity = 10 (RAW 1:1)', delay: 200, stat: 'val-accel', val: 'DISABLED', cls: 'green' },
            { tag: 'SYSTEM', text: 'CALLING SystemParametersInfo(SPI_SETMOUSE)...', delay: 500 },
            { tag: 'SUCCESS', text: 'ENHANCE POINTER PRECISION = OFF', delay: 200, stat: 'val-epp', val: 'OFF', cls: 'green' },
            { tag: 'ACTION', text: 'DISABLING MOUSE TRAILS...', delay: 150 },
            { tag: 'SYSTEM', text: 'SWITCHING POWER PLAN TO HIGH PERFORMANCE...', delay: 400, stat: 'val-power', val: 'HIGH PERF', cls: 'green' },
            { tag: 'SYSTEM', text: 'APPLYING CHANGES TO LIVE SYSTEM...', delay: 600 },
        ];

        const restoreSteps = [
            { tag: 'SYSTEM', text: 'INITIATING SYSTEM RESTORE...', delay: 400 },
            { tag: 'SYSTEM', text: 'SCANNING MODIFIED REGISTRY KEYS...', delay: 350 },
            { tag: 'ACTION', text: 'RESTORE MouseSpeed = 1', delay: 200, stat: 'val-speed', val: '1', cls: 'yellow' },
            { tag: 'ACTION', text: 'RESTORE MouseThreshold1 = 6', delay: 200, stat: 'val-t1', val: '6', cls: 'yellow' },
            { tag: 'ACTION', text: 'RESTORE MouseThreshold2 = 10', delay: 200, stat: 'val-t2', val: '10', cls: 'yellow' },
            { tag: 'ACTION', text: 'RESTORE MouseSensitivity = 10', delay: 200, stat: 'val-accel', val: 'DEFAULT', cls: 'yellow' },
            { tag: 'SYSTEM', text: 'CALLING SystemParametersInfo(SPI_SETMOUSE)...', delay: 500 },
            { tag: 'SUCCESS', text: 'ENHANCE POINTER PRECISION = DEFAULT', delay: 200, stat: 'val-epp', val: 'DEFAULT', cls: 'yellow' },
            { tag: 'SYSTEM', text: 'RESTORING BALANCED POWER PLAN...', delay: 400, stat: 'val-power', val: 'BALANCED', cls: 'yellow' },
            { tag: 'SYSTEM', text: 'APPLYING CHANGES TO LIVE SYSTEM...', delay: 600 },
        ];

        function getTagClass(tag) {
            const map = { SYSTEM: 'tag-system', ACTION: 'tag-action', SUCCESS: 'tag-success', ERROR: 'tag-error', INFO: 'tag-info' };
            return map[tag] || 'tag-info';
        }

        async function typeLine(tag, text) {
            const div = document.createElement('div');
            div.className = 'line cursor';
            consoleEl.appendChild(div);

            const prefix = `<span class="tag ${getTagClass(tag)}">[${tag}]</span> `;
            div.innerHTML = prefix;

            for (let char of text) {
                div.innerHTML = prefix + div.innerHTML.slice(prefix.length) + char;
                await new Promise(r => setTimeout(r, 12 + Math.random() * 18));
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }
            div.classList.remove('cursor');
        }

        async function runSteps(steps) {
            statusEl.innerText = 'PROCESSING...';
            statusEl.style.animation = 'status-blink 0.5s infinite';

            for (let i = 0; i < steps.length; i++) {
                const step = steps[i];
                await typeLine(step.tag, step.text);

                // Update sidebar stat if specified
                if (step.stat) {
                    const el = document.getElementById(step.stat);
                    el.innerText = step.val;
                    el.className = `stat-value ${step.cls || 'cyan'}`;
                }

                // Update progress bar
                progressEl.style.width = `${((i + 1) / steps.length) * 80}%`;

                await new Promise(r => setTimeout(r, step.delay));
            }
        }

        async function start() {
            const steps = type === 'aim' ? aimSteps : restoreSteps;
            const endpoint = type === 'aim' ? 'http://127.0.0.1:5050/run-optimizer' : 'http://127.0.0.1:5050/restore-defaults';

            // Phase 1: Animated steps
            await runSteps(steps);

            // Phase 2: Actually call the backend
            await typeLine('SYSTEM', 'SENDING COMMANDS TO BACKEND...');
            await new Promise(r => setTimeout(r, 300));

            try {
                const res = await fetch(endpoint, { method: 'POST' });
                const data = await res.json();

                progressEl.style.width = '100%';

                if (res.ok) {
                    await typeLine('SUCCESS', data.message);

                    // Show before/after if available
                    if (data.before && data.after) {
                        await new Promise(r => setTimeout(r, 200));
                        await typeLine('INFO', `BEFORE: Speed=${data.before.MouseSpeed} Thresh1=${data.before.MouseThreshold1} Thresh2=${data.before.MouseThreshold2}`);
                        await typeLine('INFO', `AFTER:  Speed=${data.after.MouseSpeed} Thresh1=${data.after.MouseThreshold1} Thresh2=${data.after.MouseThreshold2}`);
                    }

                    // Success result box
                    const box = document.createElement('div');
                    box.className = 'result-box ok';
                    box.innerHTML = `<div class="result-title">${type === 'aim' ? 'OPTIMIZATION COMPLETE' : 'RESTORE COMPLETE'}</div>` +
                        `<div>${data.message}</div>` +
                        `<div style="margin-top:10px;color:#888;font-size:0.75rem">You can minimize this tab now.</div>`;
                    consoleEl.appendChild(box);
                    consoleEl.scrollTop = consoleEl.scrollHeight;

                    statusEl.innerText = type === 'aim' ? 'OPTIMIZED' : 'RESTORED';
                    statusEl.style.color = '#39ff14';
                    statusEl.style.animation = 'none';

                    document.getElementById('val-status').innerText = 'APPLIED';
                    document.getElementById('val-status').className = 'stat-value green';

                    progressEl.style.background = '#39ff14';
                } else {
                    await typeLine('ERROR', data.message || 'Unknown error from server');

                    const box = document.createElement('div');
                    box.className = 'result-box fail';
                    box.innerHTML = `<div class="result-title">OPERATION FAILED</div>` +
                        `<div>${data.message}</div>` +
                        `<div style="margin-top:10px">Run optimize.exe as Administrator and try again.</div>`;
                    consoleEl.appendChild(box);
                    consoleEl.scrollTop = consoleEl.scrollHeight;

                    statusEl.innerText = 'FAILED';
                    statusEl.style.color = '#ff3c3c';
                    statusEl.style.animation = 'none';

                    document.getElementById('val-status').innerText = 'FAILED';
                    document.getElementById('val-status').className = 'stat-value red';

                    progressEl.style.background = '#ff3c3c';
                }
            } catch (e) {
                progressEl.style.width = '100%';
                progressEl.style.background = '#ff3c3c';

                await typeLine('ERROR', 'SERVER UNREACHABLE');

                const box = document.createElement('div');
                box.className = 'result-box fail';
                box.innerHTML = `<div class="result-title">CONNECTION FAILED</div>` +
                    `<div>Could not reach the backend server.</div>` +
                    `<div style="margin-top:10px">Make sure optimize.exe is running as Administrator.</div>`;
                consoleEl.appendChild(box);
                consoleEl.scrollTop = consoleEl.scrollHeight;

                statusEl.innerText = 'OFFLINE';
                statusEl.style.color = '#ff3c3c';
                statusEl.style.animation = 'none';

                document.getElementById('val-status').innerText = 'OFFLINE';
                document.getElementById('val-status').className = 'stat-value red';
            }
        }

        setTimeout(start, 500);
    </script>
</body>

</html>
